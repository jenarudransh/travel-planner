<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Planner</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header class="glass-header">
        <h1>Travel Planner</h1>
        <p>A* • Multi-Stop • Weather Engine • Terrain Metrics</p>
    </header>

    <div class="main-container">
        <div class="control-panel glass-panel">
            <h3>Plan Your Journey</h3>
            
            <div class="form-group">
                <label>Start City</label>
                <select id="startCity"><option value="">Select...</option></select>
            </div>

            <div id="waypointContainer" class="form-group" style="display: none;">
                <label style="color: #f39c12;">Via (Mandatory Stop)</label>
                <select id="waypointCity"><option value="">Select Waypoint...</option></select>
            </div>
            <button class="btn-secondary" id="addWaypointBtn" onclick="toggleWaypoint()" style="margin-bottom: 15px; font-size: 0.8em; padding: 5px;">
                + Add Mandatory Stop
            </button>

            <div class="form-group">
                <label>Destination City</label>
                <select id="destCity"><option value="">Select...</option></select>
            </div>

            <div class="form-group">
                <label>Algorithm</label>
                <select id="algoSelect">
                    <option value="astar">A* Search (Smart/Heuristic)</option>
                    <option value="dijkstra">Dijkstra's (Exploratory)</option>
                </select>
            </div>

            <div class="instruction-text">
                <b>Live Simulation:</b> Blue storms heavily penalize travel time. Roads through mountains naturally cost more fuel.
            </div>

            <button class="btn-search" id="searchBtn" onclick="startVisualization()">
                Calculate Optimal Route
            </button>

            <div id="resultBox" class="result-box" style="display:none;">
                <div class="stat-grid">
                    <div class="stat-card"><span>Dist</span><span id="resDistance" class="stat-value">0</span></div>
                    <div class="stat-card"><span>Time</span><span id="resTime" class="stat-value">0</span></div>
                    <div class="stat-card"><span>Fuel (₹)</span><span id="resCost" class="stat-value">0</span></div>
                    <div class="stat-card"><span>CO₂</span><span id="resCO2" class="stat-value">0</span></div>
                    <div class="stat-card"><span>Stops</span><span id="resAmenities" class="stat-value">0</span></div>
                    <div class="stat-card"><span>Nodes</span><span id="resExplored" class="stat-value">0</span></div>
                </div>
                <div class="route-display-container">
                    <label>Navigating via:</label>
                    <div id="resPath" class="path-display" style="font-size: 0.85em;"></div>
                </div>
            </div>
        </div>

        <div class="map-container glass-panel">
            <div id="tooltip"></div>
            <canvas id="graph-canvas"></canvas>
        </div>
    </div>
</body>
</html>
